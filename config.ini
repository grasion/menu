# ============================================
# 근처 식당 돌림판 - 설정 파일
# ============================================
# 이 파일은 참고용입니다.
# 실제 설정은 app.js 상단의 CONFIG 객체에서 변경하세요.
# GitHub에 올릴 때 API 키는 반드시 제거하거나
# .gitignore에 이 파일을 추가하세요.

[kakao]
# 카카오 개발자 사이트에서 발급받은 JavaScript 앱 키
# https://developers.kakao.com → 내 애플리케이션 → 앱 키
app_key = b73aa51f19448374889af9f6d2e4036b

[search]
# 기본 검색 반경 (미터 단위, 500~5000)
default_radius = 1500

# 최대 검색 페이지 수 (1페이지 = 15개, 최대 3페이지 = 45개)
max_pages = 3

[deploy]
# GitHub Pages 배포 시 카카오 플랫폼에 등록할 도메인
# 예: https://username.github.io
site_domain = https://your-username.github.io
